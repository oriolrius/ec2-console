---
# Visual Studio Code — desktop application + settings + extensions

- name: Add Microsoft GPG key
  shell: |
    curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
      | gpg --dearmor -o /etc/apt/keyrings/microsoft.gpg
  args:
    creates: /etc/apt/keyrings/microsoft.gpg

- name: Add VS Code apt repository
  copy:
    dest: /etc/apt/sources.list.d/vscode.list
    content: "deb [signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/code stable main\n"
    mode: '0644'

- name: Install VS Code
  apt:
    name: code
    state: present
    update_cache: true

- name: Create VS Code user settings directory
  become_user: ubuntu
  file:
    path: "{{ ubuntu_home }}/.config/Code/User"
    state: directory

- name: Deploy VS Code settings
  become_user: ubuntu
  copy:
    src: "files/vscode/settings.json"
    dest: "{{ ubuntu_home }}/.config/Code/User/settings.json"

- name: Install VS Code extensions
  become_user: ubuntu
  shell: "code --install-extension {{ item }} --force 2>/dev/null || true"
  loop: "{{ lookup('file', 'files/vscode/extensions.txt').splitlines() | select }}"
  register: ext_result
  changed_when: "'was successfully installed' in ext_result.stdout"
