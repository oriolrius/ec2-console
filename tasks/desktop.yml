---
# XFCE4 desktop + Chrome Remote Desktop
# CRD uses Google's relay — no inbound port required.
# After provisioning, run the one-time registration (see README).

- name: Install XFCE4 desktop environment
  apt:
    name:
      - xfce4
      - xfce4-goodies
      - xfce4-clipman-plugin
      - dbus-x11
      - x11-xserver-utils
      - xclip
      - fonts-noto-color-emoji
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Add Google Chrome Remote Desktop signing key
  shell: |
    curl -fsSL https://dl.google.com/linux/linux_signing_key.pub \
      | gpg --dearmor -o /etc/apt/keyrings/google-crd.gpg
  args:
    creates: /etc/apt/keyrings/google-crd.gpg

- name: Add Chrome Remote Desktop repository
  copy:
    dest: /etc/apt/sources.list.d/chrome-remote-desktop.list
    content: "deb [signed-by=/etc/apt/keyrings/google-crd.gpg] https://dl.google.com/linux/chrome-remote-desktop/deb/ stable main\n"
    mode: '0644'

- name: Install Chrome Remote Desktop
  apt:
    name: chrome-remote-desktop
    state: present
    update_cache: true

- name: Create chrome-remote-desktop group if missing
  group:
    name: chrome-remote-desktop
    state: present

- name: Add ubuntu user to chrome-remote-desktop group
  user:
    name: ubuntu
    groups: chrome-remote-desktop
    append: true

- name: Deploy CRD session startup script
  copy:
    dest: "{{ ubuntu_home }}/.chrome-remote-desktop-session"
    content: |
      export CHROME_REMOTE_DESKTOP_DEFAULT_DESKTOP_SIZES="1920x1080"
      export LANG=en_US.UTF-8
      setxkbmap us
      startxfce4
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Ensure D-Bus session starts on login
  blockinfile:
    path: "{{ ubuntu_home }}/.profile"
    marker: "# {mark} dbus-session"
    block: |
      if [ ! -S "/run/user/$(id -u)/bus" ]; then
          dbus-daemon --session --address="unix:path=/run/user/$(id -u)/bus" --fork 2>/dev/null
      fi
    owner: ubuntu
    group: ubuntu

- name: Create xfconf config directory
  become_user: ubuntu
  file:
    path: "{{ ubuntu_home }}/.config/xfce4/xfconf/xfce-perchannel-xml"
    state: directory

- name: Deploy XFCE panel config (remove network/volume icons, keep power manager)
  become_user: ubuntu
  copy:
    src: "files/desktop/xfconf/xfce4-panel.xml"
    dest: "{{ ubuntu_home }}/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-panel.xml"

- name: Deploy XFCE power manager config (presentation mode on, no screen blanking)
  become_user: ubuntu
  copy:
    src: "files/desktop/xfconf/xfce4-power-manager.xml"
    dest: "{{ ubuntu_home }}/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-power-manager.xml"

- name: Disable NetworkManager applet autostart
  copy:
    dest: /etc/xdg/autostart/nm-applet.desktop
    content: |
      [Desktop Entry]
      Type=Application
      Name=Network
      Hidden=true
    mode: '0644'
