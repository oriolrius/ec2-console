---
# System baseline: apt update/upgrade + common packages

- name: Update apt cache and upgrade packages
  apt:
    update_cache: true
    upgrade: dist
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Install system prerequisites
  apt:
    name: [ca-certificates, curl, gnupg, bzip2, unzip, xz-utils, git, jq, htop, btop]
    state: present
